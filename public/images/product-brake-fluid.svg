<svg width="400" height="240" viewBox="0 0 400 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="240" rx="12" fill="#F5F3FF"/>
  <!-- Brake fluid bottle -->
  <rect x="155" y="35" width="90" height="155" rx="10" fill="#7C3AED"/>
  <rect x="155" y="35" width="90" height="155" rx="10" fill="url(#brakeGrad)" opacity="0.5"/>
  <!-- Narrow neck -->
  <rect x="180" y="15" width="40" height="30" rx="3" fill="#6D28D9"/>
  <!-- Cap -->
  <rect x="186" y="6" width="28" height="14" rx="3" fill="#FBCE07"/>
  <!-- Label -->
  <rect x="165" y="90" width="70" height="50" rx="4" fill="white" opacity="0.9"/>
  <text x="200" y="112" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="9" fill="#7C3AED">BRAKE</text>
  <text x="200" y="127" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="9" fill="#0F172A">FLUID DOT 4</text>
  <!-- Measurement lines -->
  <line x1="175" y1="60" x2="190" y2="60" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="175" y1="70" x2="195" y2="70" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="175" y1="80" x2="185" y2="80" stroke="white" stroke-width="1" opacity="0.4"/>
  <defs>
    <linearGradient id="brakeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
</svg>
