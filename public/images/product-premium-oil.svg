<svg width="400" height="240" viewBox="0 0 400 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="240" rx="12" fill="#FEF3C7"/>
  <!-- Oil bottle -->
  <rect x="155" y="50" width="90" height="140" rx="12" fill="#DD1D21"/>
  <rect x="155" y="50" width="90" height="140" rx="12" fill="url(#bottleGrad)" opacity="0.7"/>
  <!-- Bottle neck -->
  <rect x="180" y="20" width="40" height="40" rx="4" fill="#B91C1C"/>
  <!-- Cap -->
  <rect x="185" y="10" width="30" height="16" rx="3" fill="#FBCE07"/>
  <!-- Label -->
  <rect x="165" y="90" width="70" height="50" rx="4" fill="white" opacity="0.9"/>
  <text x="200" y="115" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="11" fill="#DD1D21">PREMIUM</text>
  <text x="200" y="130" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="10" fill="#0F172A">ENGINE OIL</text>
  <!-- Oil drop icon on label -->
  <path d="M200 78 L195 83 L205 83 Z" fill="#FBCE07"/>
  <!-- Shine -->
  <rect x="170" y="60" width="8" height="30" rx="4" fill="white" opacity="0.15" transform="rotate(-15 170 60)"/>
  <defs>
    <linearGradient id="bottleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FBCE07"/>
      <stop offset="100%" stop-color="#DD1D21"/>
    </linearGradient>
  </defs>
</svg>
